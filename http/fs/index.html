<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STM32 Ethernet Web Server</title>

<style>

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#eef2f7;
}

.container{
    max-width:650px;
    margin:60px auto;
    background:white;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
    padding:40px;
    text-align:center;
}

h1{
    color:#0d47a1;
    margin-bottom:10px;
}

h3{
    color:#555;
    margin-top:0;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:15px;
    font-size:18px;
}

select{
    padding:8px;
    font-size:16px;
}

button{
    margin-top:30px;
    padding:12px 30px;
    font-size:18px;
    background:#1976d2;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#125ca1;
}

.footer{
    margin-top:30px;
    color:#777;
    font-size:14px;
}

.green{
color:#00aa00;
font-weight:bold;
}

.blue{
color:#0066ff;
font-weight:bold;
}

.red{
color:#d50000;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>STM32 Ethernet Web Server</h1>

<h3>Browser-Based LED Control using LwIP HTTP Server & CGI</h3>

<form action="LEDControl.cgi" method="GET">

<table>

<tr>
<td class="green">Green LED</td>

<td>
<select name="green">
<option selected>ON</option>
<option>OFF</option>
</select>
</td>

</tr>

<tr>

<td class="blue">Blue LED</td>

<td>
<select name="blue">
<option selected>ON</option>
<option>OFF</option>
</select>
</td>

</tr>

<tr>

<td class="red">Red LED</td>

<td>
<select name="red">
<option selected>ON</option>
<option>OFF</option>
</select>
</td>

</tr>

</table>

<button type="submit">
Apply Changes
</button>

</form>

<div class="footer">

Developed using STM32F767ZI • LwIP • HTTP Server • CGI

</div>

</div>

</body>
</html>
