<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<style>

body{

margin:0;

font-family:Arial,Helvetica,sans-serif;

background:#f4f6f8;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.card{

background:white;

padding:50px;

border-radius:10px;

text-align:center;

box-shadow:0px 5px 15px rgba(0,0,0,.2);

max-width:500px;

}

h1{

font-size:90px;

color:#d32f2f;

margin:0;

}

h2{

margin-top:10px;

color:#333;

}

p{

color:#666;

font-size:18px;

margin-bottom:30px;

}

a{

background:#1976d2;

color:white;

padding:12px 25px;

text-decoration:none;

border-radius:5px;

}

a:hover{

background:#0d47a1;

}

</style>

</head>

<body>

<div class="card">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

The requested webpage could not be found on the STM32 Embedded Web Server.

</p>

<a href="/index.html">

Return to Home

</a>

</div>

</body>

</html>
